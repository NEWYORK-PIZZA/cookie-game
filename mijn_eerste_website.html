<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Game Pro</title>

  <!-- PWA SETTINGS -->
  <meta name="theme-color" content="#3b2a22">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="manifest" id="manifest">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2b1d16;
      color: #fff;
      overflow: hidden;
    }

    header {
      background: #3b2a22;
      padding: 10px;
      text-align: center;
      font-weight: bold;
    }

    .statsbar {
      display: flex;
      justify-content: space-around;
      background: #1f1511;
      padding: 10px;
      font-size: 14px;
    }

    .game {
      display: flex;
      height: calc(100vh - 80px);
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .cookie {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #d9a066, #7a4a24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.05s;
    }

    .cookie:active { transform: scale(0.95); }

    .right {
      width: 320px;
      background: #1f1511;
      border-left: 2px solid #3b2a22;
      overflow-y: auto;
      padding: 10px;
    }

    .item {
      background: #3a2a22;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      background: #a86a2c;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #c07a33; }

    #installBtn {
      position: fixed;
      bottom: 10px;
      left: 10px;
      padding: 10px;
      background: green;
      border: none;
      border-radius: 8px;
      color: white;
      display: none;
    }
  </style>
</head>
<body>

<header>🍪 Cookie Game Pro</header>

<div class="statsbar">
  <div>Cookies: <span id="cookies">0</span></div>
  <div>CPS: <span id="cps">0</span></div>
  <div>Per Click: <span id="perClick">1</span></div>
</div>

<div class="game">
  <div class="left">
    <div class="cookie" onclick="clickCookie()">🍪</div>
  </div>

  <div class="right">
    <h3>Buildings</h3>
    <div id="shop"></div>
  </div>
</div>

<button id="installBtn" onclick="installApp()">Install App</button>

<script>
  let cookies = 0;
  let perClick = 1;

  const buildings = [
    { name: "Cursor", baseCost: 15, cps: 0.1, amount: 0 },
    { name: "Grandma", baseCost: 100, cps: 1, amount: 0 },
    { name: "Farm", baseCost: 1100, cps: 8, amount: 0 },
    { name: "Factory", baseCost: 12000, cps: 47, amount: 0 }
  ];

  function getCost(b) {
    return Math.floor(b.baseCost * Math.pow(1.15, b.amount));
  }

  function getCPS() {
    return buildings.reduce((t,b)=>t + b.cps*b.amount,0);
  }

  function update() {
    document.getElementById("cookies").innerText = Math.floor(cookies);
    document.getElementById("cps").innerText = getCPS().toFixed(1);
    document.getElementById("perClick").innerText = perClick;
    render();
  }

  function clickCookie() {
    cookies += perClick;
    update();
  }

  function buy(i) {
    let b = buildings[i];
    let cost = getCost(b);
    if (cookies >= cost) {
      cookies -= cost;
      b.amount++;
      update();
    }
  }

  function render() {
    let shop = document.getElementById("shop");
    shop.innerHTML = "";

    buildings.forEach((b,i)=>{
      shop.innerHTML += `<div class='item'>
        <b>${b.name}</b><br>
        ${b.amount} owned<br>
        CPS: ${(b.cps*b.amount).toFixed(1)}<br>
        <button onclick='buy(${i})'>Buy (${getCost(b)})</button>
      </div>`;
    });
  }

  setInterval(()=>{
    cookies += getCPS()/10;
    update();
  },100);

  // PWA install
  let deferred;
  const btn = document.getElementById("installBtn");

  window.addEventListener("beforeinstallprompt", e=>{
    e.preventDefault();
    deferred = e;
    btn.style.display = "block";
  });

  function installApp(){
    if(deferred){
      deferred.prompt();
    }
  }

  update();
</script>

</
